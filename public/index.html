<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ओम बेकरी - ग्राहक प्रबंधन</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f9f9f9;
        }
        .container {
            max-width: 600px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
            margin: auto;
        }
        h2 { text-align: center; color: #d35400; }
        .form-group, .search-group {
            margin-bottom: 15px;
        }
        input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        select {
            background-color: #fff;
            cursor: pointer;
        }
        .search-box {
            background-color: #f1f1f1;
            border: 2px solid #d35400;
        }
        button {
            background-color: #27ae60;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }
        button:hover { background-color: #219150; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }
        th { background-color: #f2f2f2; }
        .btn-delete {
            background-color: #c0392b;
            padding: 5px 10px;
            font-size: 12px;
            width: auto;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-delete:hover { background-color: #a93226; }
    </style>
</head>
<body>

<div class="container">
    <h2>🍰 ओम बेकरी - ग्राहक लिस्ट 🍰</h2>
    
    <!-- ग्राहक जोड़ने और मैसेज चुनने का फॉर्म -->
    <div class="form-group">
        <label><b>ग्राहक की जानकारी:</b></label>
        <input type="text" id="custName" placeholder="ग्राहक का नाम डालें">
        <input type="number" id="custPhone" placeholder="मोबाइल नंबर डालें">
        
        <label style="margin-top: 10px; display: block;"><b>भेजे जाने वाला मैसेज चुनें:</b></label>
        <select id="messageType">
            <option value="welcome">🍰 स्वागत मैसेज (Welcome Message)</option>
            <option value="birthday">🎂 जन्मदिन की शुभकामनाएं (Birthday Wish)</option>
            <option value="anniversary">💐 एनिवर्सरी की शुभकामनाएं (Anniversary Wish)</option>
        </select>

        <button onclick="addCustomer()" style="margin-top: 15px;">डेटा सेव करें और WhatsApp भेजें</button>
    </div>

    <hr>

    <!-- 🔍 सर्च बॉक्स ऑप्शन -->
    <div class="search-group">
        <label style="font-weight: bold; color: #333;">🔍 ग्राहक खोजें (नाम या मोबाइल नंबर डालें):</label>
        <input type="text" id="searchBar" class="search-box" placeholder="यहाँ टाइप करें..." onkeyup="filterCustomers()">
    </div>

    <!-- ग्राहकों की तालिका (Table) -->
    <table>
        <thead>
            <tr>
                <th>नाम</th>
                <th>मोबाइल नंबर</th>
                <th>एक्शन</th>
            </tr>
        </thead>
        <tbody id="customerTableBody">
            <!-- डेटा यहाँ लोड होगा -->
        </tbody>
    </table>
</div>

<script>
    // ==========================================
    // ⚙️ अपनी WHATSAPP API की क्रेडेंशियल्स यहाँ डालें
    // ==========================================
    const WHATSAPP_TOKEN = "YOUR_PERMANENT_ACCESS_TOKEN_HERE"; 
    const PHONE_NUMBER_ID = "YOUR_PHONE_NUMBER_ID_HERE";     

    // 🏷️ मेटा (Meta) पर अप्रूव किए गए टेम्पलेट्स के नाम यहाँ लिखें:
    const TEMPLATE_WELCOME = "welcome_customer";       // स्वागत टेम्पलेट का नाम
    const TEMPLATE_BIRTHDAY = "om_bakery_birthday";    // जन्मदिन वाले टेम्पलेट का नाम
    const TEMPLATE_ANNIVERSARY = "om_bakery_anniversary"; // एनिवर्सरी वाले टेम्पलेट का नाम

    let customers = [
        { name: "राहुल कुमार", phone: "9876543210" },
        { name: "अमित शर्मा", phone: "9123456789" }
    ];

    function displayCustomers(dataToDisplay) {
        const tableBody = document.getElementById("customerTableBody");
        tableBody.innerHTML = ""; 

        if(dataToDisplay.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="3" style="text-align:center; color:red;">कोई ग्राहक नहीं मिला!</td></tr>`;
            return;
        }

        dataToDisplay.forEach((customer) => {
            let row = `<tr>
                <td>${customer.name}</td>
                <td>${customer.phone}</td>
                <td><button class="btn-delete" onclick="deleteCustomer('${customer.phone}')">डिलीट</button></td>
            </tr>`;
            tableBody.innerHTML += row;
        });
    }

    function addCustomer() {
        let name = document.getElementById("custName").value.trim();
        let phone = document.getElementById("custPhone").value.trim();
        let msgType = document.getElementById("messageType").value; // चुना हुआ मैसेज टाइप

        if (name === "" || phone === "") {
            alert("कृपया नाम और नंबर दोनों भरें!");
            return;
        }

        // लिस्ट में जोड़ें
        customers.push({ name: name, phone: phone });
        
        // 🚀 चुना हुआ मैसेज टाइप पास करके WhatsApp भेजें
        sendWhatsAppNotification(name, phone, msgType);

        // इनपुट बॉक्स खाली करें
        document.getElementById("custName").value = "";
        document.getElementById("custPhone").value = "";

        // लिस्ट अपडेट करें
        filterCustomers(); 
    }

    function deleteCustomer(phone) {
        if(confirm("क्या आप वाकई इस ग्राहक को डिलीट करना चाहते हैं?")) {
            customers = customers.filter(customer => customer.phone !== phone);
            filterCustomers(); 
        }
    }

    function filterCustomers() {
        let searchValue = document.getElementById("searchBar").value.toLowerCase().trim();
        let filteredList = customers.filter(customer => {
            return customer.name.toLowerCase().includes(searchValue) || customer.phone.includes(searchValue);
        });
        displayCustomers(filteredList);
    }

    // 📲 WhatsApp API फंक्शन (जो अब अलग-अलग टेम्पलेट संभाल सकता है)
    function sendWhatsAppNotification(customerName, customerPhone, msgType) {
        let formattedPhone = customerPhone.startsWith("91") ? customerPhone : "91" + customerPhone;
        const url = `https://graph.facebook.com/v18.0/${PHONE_NUMBER_ID}/messages`;

        // ड्रॉपडाउन के आधार पर सही टेम्पलेट का चुनाव करना
        let chosenTemplate = TEMPLATE_WELCOME;
        if (msgType === "birthday") {
            chosenTemplate = TEMPLATE_BIRTHDAY;
        } else if (msgType === "anniversary") {
            chosenTemplate = TEMPLATE_ANNIVERSARY;
        }

        const payload = {
            messaging_product: "whatsapp",
            to: formattedPhone,
            type: "template",
            template: {
                name: chosenTemplate, 
                language: { code: "hi" }, 
                components: [
                    {
                        type: "body",
                        parameters: [
                            { type: "text", text: customerName } // यह ग्राहक का नाम टेम्पलेट में भर देगा
                        ]
                    }
                ]
            }
        };

        fetch(url, {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${WHATSAPP_TOKEN}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
        })
        .then(response => response.json())
        .then(data => {
            if (data.messages) {
                alert(`मैसेज सफलता पूर्वक भेज दिया गया है! (${msgType} मैसेज)`);
            } else {
                console.error("WhatsApp API एरर:", data);
                alert("मैसेज भेजने में एरर आया। कृपया कंसोल चेक करें।");
            }
        })
        .catch(error => console.error("नेटवर्क एरर:", error));
    }

    displayCustomers(customers);
</script>

</body>
</html>
