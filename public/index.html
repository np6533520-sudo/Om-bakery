<!DOCTYPE html>
<html lang="hi">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ओम बेकरी - ग्राहक प्रबंधन</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f9f9f9;
        }
        .container {
            max-width: 600px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
            margin: auto;
        }
        h2 { text-align: center; color: #d35400; }
        h3 { color: #2c3e50; border-bottom: 2px solid #ecf0f1; padding-bottom: 5px; }
        .form-group, .search-group, .reminder-section {
            margin-bottom: 15px;
        }
        input[type="text"], input[type="number"], input[type="date"], select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        .search-box {
            background-color: #f1f1f1;
            border: 2px solid #d35400;
        }
        button {
            background-color: #27ae60;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }
        button:hover { background-color: #219150; }
        .btn-reminder {
            background-color: #e67e22;
            padding: 5px 10px;
            font-size: 12px;
            width: auto;
            display: inline-block;
        }
        .btn-reminder:hover { background-color: #d35400; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }
        th { background-color: #f2f2f2; }
        .btn-delete {
            background-color: #c0392b;
            padding: 5px 10px;
            font-size: 12px;
            width: auto;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-delete:hover { background-color: #a93226; }
        .alert-box {
            background-color: #fff3cd;
            border-left: 5px solid #ffc107;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🍰 ओम बेकरी - ग्राहक लिस्ट 🍰</h2>
    
    <!-- 🔔 आज के जन्मदिन/एनिवर्सरी का ऑटो-रिमाइंडर सेक्शन -->
    <div id="reminderSection" class="reminder-section" style="display: none;">
        <h3>🎉 आज के विशेष संदेश (सालगिरह/जन्मदिन रिमाइंडर)</h3>
        <div id="reminderList"></div>
    </div>

    <!-- ग्राहक जोड़ने का फॉर्म -->
    <div class="form-group">
        <h3>👤 नया ग्राहक जोड़ें</h3>
        <input type="text" id="custName" placeholder="ग्राहक का नाम डालें">
        <input type="number" id="custPhone" placeholder="मोबाइल नंबर डालें">
        
        <label style="margin-top: 10px; display: block;"><b>तारीख चुनें (जन्मदिन या एनिवर्सरी की तारीख):</b></label>
        <input type="date" id="custDate">

        <label style="margin-top: 10px; display: block;"><b>मैसेज का प्रकार:</b></label>
        <select id="messageType">
            <option value="birthday">🎂 जन्मदिन की शुभकामनाएं (Birthday Wish)</option>
            <option value="anniversary">💐 एनिवर्सरी की शुभकामनाएं (Anniversary Wish)</option>
        </select>

        <button onclick="addCustomer()" style="margin-top: 15px;">डेटा सेव करें और आज ही WhatsApp भेजें</button>
    </div>

    <hr>

    <!-- 🔍 लाइव सर्च बॉक्स -->
    <div class="search-group">
        <h3>🔍 ग्राहक खोजें</h3>
        <input type="text" id="searchBar" class="search-box" placeholder="नाम या मोबाइल नंबर से खोजें..." onkeyup="filterCustomers()">
    </div>

    <!-- ग्राहकों की तालिका (Table) -->
    <table>
        <thead>
            <tr>
                <th>नाम</th>
                <th>मोबाइल नंबर</th>
                <th>तारीख और प्रकार</th>
                <th>एक्शन</th>
            </tr>
        </thead>
        <tbody id="customerTableBody">
            <!-- डेटा यहाँ लोड होगा -->
        </tbody>
    </table>
</div>

<script>
    // ==========================================
    // ⚙️ अपनी WHATSAPP API की क्रेडेंशियल्स यहाँ डालें
    // ==========================================
    const WHATSAPP_TOKEN = "YOUR_PERMANENT_ACCESS_TOKEN_HERE"; 
    const PHONE_NUMBER_ID = "YOUR_PHONE_NUMBER_ID_HERE";     

    const TEMPLATE_BIRTHDAY = "om_bakery_birthday";    
    const TEMPLATE_ANNIVERSARY = "om_bakery_anniversary"; 

    // ब्राउज़र की मेमरी (localStorage) से पुराना डेटा लोड करना, ताकि 2000 कस्टमर भी सुरक्षित रहें
    let customers = JSON.parse(localStorage.getItem("omBakeryCustomers")) || [];

    // 1. लिस्ट को स्क्रीन पर दिखाने का फंक्शन
    function displayCustomers(dataToDisplay) {
        const tableBody = document.getElementById("customerTableBody");
        tableBody.innerHTML = ""; 

        if(dataToDisplay.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:red;">कोई ग्राहक नहीं मिला!</td></tr>`;
            return;
        }

        dataToDisplay.forEach((customer) => {
            let typeText = customer.type === "birthday" ? "🎂 जन्मदिन" : "💐 एनिवर्सरी";
            let row = `<tr>
                <td>${customer.name}</td>
                <td>${customer.phone}</td>
                <td>${customer.date} (${typeText})</td>
                <td><button class="btn-delete" onclick="deleteCustomer('${customer.phone}')">डिलीट</button></td>
            </tr>`;
            tableBody.innerHTML += row;
        });
    }

    // 2. नया ग्राहक जोड़ने के लिए फंक्शन (जो आज मैसेज भेजेगा और तारीख सेव करेगा)
    function addCustomer() {
        let name = document.getElementById("custName").value.trim();
        let phone = document.getElementById("custPhone").value.trim();
        let date = document.getElementById("custDate").value;
        let msgType = document.getElementById("messageType").value;

        if (name === "" || phone === "" || date === "") {
            alert("कृपया नाम, नंबर और तारीख तीनों भरें!");
            return;
        }

        // लिस्ट में जोड़ें
        customers.push({ name: name, phone: phone, date: date, type: msgType });
        
        // मेमरी में परमानेंट सेव करें
        localStorage.setItem("omBakeryCustomers", JSON.stringify(customers));
        
        // 🚀 आज के दिन तुरंत पहला WhatsApp मैसेज भेजें
        sendWhatsAppNotification(name, phone, msgType);

        // फॉर्म खाली करें
        document.getElementById("custName").value = "";
        document.getElementById("custPhone").value = "";
        document.getElementById("custDate").value = "";

        // स्क्रीन अपडेट करें
        filterCustomers(); 
        checkDailyReminders(); // रिमाइंडर लिस्ट अपडेट करें
    }

    // 3. ग्राहक डिलीट करने के लिए फंक्शन
    function deleteCustomer(phone) {
        if(confirm("क्या आप वाकई इस ग्राहक को लिस्ट से हटाना चाहते हैं?")) {
            customers = customers.filter(customer => customer.phone !== phone);
            localStorage.setItem("omBakeryCustomers", JSON.stringify(customers));
            filterCustomers(); 
            checkDailyReminders();
        }
    }

    // 4. 🔍 लाइव सर्च फंक्शन
    function filterCustomers() {
        let searchValue = document.getElementById("searchBar").value.toLowerCase().trim();
        let filteredList = customers.filter(customer => {
            return customer.name.toLowerCase().includes(searchValue) || customer.phone.includes(searchValue);
        });
        displayCustomers(filteredList);
    }

    // 5. 🔔 ऑटो-रिमाइंडर चेक करने का फंक्शन (जो हर साल उसी तारीख को पकड़ेगा)
    function checkDailyReminders() {
        const reminderSection = document.getElementById("reminderSection");
        const reminderList = document.getElementById("reminderList");
        reminderList.innerHTML = "";

        // आज की तारीख (Format: MM-DD) निकालना ताकि साल (Year) का फर्क न पड़े
        let today = new Date();
        let todayMMDD = String(today.getMonth() + 1).padStart(2, '0') + "-" + String(today.getDate()).padStart(2, '0');

        let matches = [];

        customers.forEach(customer => {
            // सेव की गई तारीख से MM-DD निकालना
            let custDateObj = new Date(customer.date);
            let custMMDD = String(custDateObj.getMonth() + 1).padStart(2, '0') + "-" + String(custDateObj.getDate()).padStart(2, '0');

            if (todayMMDD === custMMDD) {
                matches.push(customer);
            }
        });

        if (matches.length > 0) {
            reminderSection.style.display = "block";
            matches.forEach(cust => {
                let typeName = cust.type === "birthday" ? "जन्मदिन" : "सालगिरह (एनिवर्सरी)";
                reminderList.innerHTML += `
                    <div class="alert-box">
                        🎉 आज <b>${cust.name}</b> का <b>${typeName}</b> है! 
                        <button class="btn-reminder" onclick="sendWhatsAppNotification('${cust.name}', '${cust.phone}', '${cust.type}')">मैसेज भेजें</button>
                    </div>`;
            });
        } else {
            reminderSection.style.display = "none";
        }
    }

    // 6. 📲 WhatsApp API भेजने का मुख्य फंक्शन
    function sendWhatsAppNotification(customerName, customerPhone, msgType) {
        let formattedPhone = customerPhone.startsWith("91") ? customerPhone : "91" + customerPhone;
        const url = `https://graph.facebook.com/v18.0/${PHONE_NUMBER_ID}/messages`;

        let chosenTemplate = msgType === "birthday" ? TEMPLATE_BIRTHDAY : TEMPLATE_ANNIVERSARY;

        const payload = {
            messaging_product: "whatsapp",
            to: formattedPhone,
            type: "template",
            template: {
                name: chosenTemplate, 
                language: { code: "hi" }, 
                components: [
                    {
                        type: "body",
                        parameters: [{ type: "text", text: customerName }]
                    }
                ]
            }
        };

        fetch(url, {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${WHATSAPP_TOKEN}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
        })
        .then(response => response.json())
        .then(data => {
            if (data.messages) {
                alert(`${customerName} को मैसेज सफलतापूर्वक भेज दिया गया है!`);
            } else {
                console.error("WhatsApp API एरर:", data);
                alert("मैसेज भेजने में कोई दिक्कत आई। कृपया चेक करें।");
            }
        })
        .catch(error => console.error("नेटवर्क एरer:", error));
    }

    // पेज चालू होते ही डेटा लोड करें और आज के जन्मदिन चेक करें
    displayCustomers(customers);
    checkDailyReminders();
</script>

</body>
</html>
