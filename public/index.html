<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ओम बेकरी - ग्राहक प्रबंधन</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f9f9f9;
        }
        .container {
            max-width: 600px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
            margin: auto;
        }
        h2 { text-align: center; color: #d35400; }
        .form-group, .search-group {
            margin-bottom: 15px;
        }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .search-box {
            background-color: #f1f1f1;
            border: 2px solid #d35400;
        }
        button {
            background-color: #27ae60;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }
        button:hover { background-color: #219150; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }
        th { background-color: #f2f2f2; }
        .btn-delete {
            background-color: #c0392b;
            padding: 5px 10px;
            font-size: 12px;
            width: auto;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-delete:hover { background-color: #a93226; }
    </style>
</head>
<body>

<div class="container">
    <h2>🍰 ओम बेकरी - ग्राहक लिस्ट 🍰</h2>
    
    <div class="form-group">
        <input type="text" id="custName" placeholder="ग्राहक का नाम डालें">
        <input type="number" id="custPhone" placeholder="मोबाइल नंबर डालें">
        <button onclick="addCustomer()" style="margin-top: 10px;">ग्राहक जोड़ें</button>
    </div>

    <hr>

    <div class="search-group">
        <label style="font-weight: bold; color: #333;">🔍 ग्राहक खोजें (नाम या मोबाइल नंबर डालें):</label>
        <input type="text" id="searchBar" class="search-box" placeholder="यहाँ टाइप करें..." onkeyup="filterCustomers()">
    </div>

    <table>
        <thead>
            <tr>
                <th>नाम</th>
                <th>मोबाइल नंबर</th>
                <th>एक्शन</th>
            </tr>
        </thead>
        <tbody id="customerTableBody">
            </tbody>
    </table>
</div>

<script>
    // ==========================================
    // ⚙️ यहाँ अपनी WHATSAPP API की डिटेल्स डालें
    // ==========================================
    const WHATSAPP_TOKEN = "YOUR_PERMANENT_ACCESS_TOKEN_HERE"; // अपना परमानेंट टोकन यहाँ पेस्ट करें
    const PHONE_NUMBER_ID = "YOUR_PHONE_NUMBER_ID_HERE";     // अपनी फ़ोन नंबर आईडी यहाँ पेस्ट करें
    const TEMPLATE_NAME = "welcome_customer";                 // अपने अप्रूव्ड टेम्पलेट का नाम डालें

    // ग्राहकों का डेटा रखने के लिए ऐरे (Array)
    let customers = [
        { name: "राहुल कुमार", phone: "9876543210" },
        { name: "अमित शर्मा", phone: "9123456789" }
    ];

    // 1. लिस्ट को स्क्रीन पर दिखाने का फंक्शन
    function displayCustomers(dataToDisplay) {
        const tableBody = document.getElementById("customerTableBody");
        tableBody.innerHTML = ""; 

        if(dataToDisplay.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="3" style="text-align:center; color:red;">कोई ग्राहक नहीं मिला!</td></tr>`;
            return;
        }

        dataToDisplay.forEach((customer) => {
            let row = `<tr>
                <td>${customer.name}</td>
                <td>${customer.phone}</td>
                <td><button class="btn-delete" onclick="deleteCustomer('${customer.phone}')">डिलीट</button></td>
            </tr>`;
            tableBody.innerHTML += row;
        });
    }

    // 2. नया ग्राहक जोड़ने के लिए फंक्शन
    function addCustomer() {
        let name = document.getElementById("custName").value.trim();
        let phone = document.getElementById("custPhone").value.trim();

        if (name === "" || phone === "") {
            alert("कृपया नाम और नंबर दोनों भरें!");
            return;
        }

        // लिस्ट में जोड़ें
        customers.push({ name: name, phone: phone });
        
        // 🚀 यहाँ से WhatsApp मैसेज ट्रिगर होगा
        sendWhatsAppNotification(name, phone);

        // इनपुट बॉक्स खाली करें
        document.getElementById("custName").value = "";
        document.getElementById("custPhone").value = "";

        // लिस्ट अपडेट करें
        filterCustomers(); 
    }

    // 3. ग्राहक डिलीट करने के लिए फंक्शन
    function deleteCustomer(phone) {
        if(confirm("क्या आप वाकई इस ग्राहक को डिलीट करना चाहते हैं?")) {
            customers = customers.filter(customer => customer.phone !== phone);
            filterCustomers(); 
        }
    }

    // 4. 🔍 सर्च और फ़िल्टर फंक्शन (लाइव सर्च)
    function filterCustomers() {
        let searchValue = document.getElementById("searchBar").value.toLowerCase().trim();
        
        let filteredList = customers.filter(customer => {
            return customer.name.toLowerCase().includes(searchValue) || 
                   customer.phone.includes(searchValue);
        });

        displayCustomers(filteredList);
    }

    // 5. 📲 WhatsApp पर मैसेज भेजने का API फंक्शन
    function sendWhatsAppNotification(customerName, customerPhone) {
        // देश का कोड (91) सेट करना
        let formattedPhone = customerPhone.startsWith("91") ? customerPhone : "91" + customerPhone;
        const url = `https://graph.facebook.com/v18.0/${PHONE_NUMBER_ID}/messages`;

        const payload = {
            messaging_product: "whatsapp",
            to: formattedPhone,
            type: "template",
            template: {
                name: TEMPLATE_NAME, 
                language: { code: "hi" }, // अगर टेम्पलेट हिंदी में है तो 'hi' रखें
                components: [
                    {
                        type: "body",
                        parameters: [
                            { type: "text", text: customerName } // टेम्पलेट में वेरिएबल की जगह नाम भेजने के लिए
                        ]
                    }
                ]
            }
        };

        // मेटा सर्वर को रिक्वेस्ट भेजना
        fetch(url, {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${WHATSAPP_TOKEN}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
        })
        .then(response => response.json())
        .then(data => {
            if (data.messages) {
                console.log("मैसेज सफलतापूर्वक भेज दिया गया है!");
            } else {
                console.error("WhatsApp API एरर:", data);
            }
        })
        .catch(error => console.error("नेटवर्क एरर:", error));
    }

    // पेज लोड होते ही लिस्ट दिखाने के लिए
    displayCustomers(customers);
</script>

</body>
</html>
